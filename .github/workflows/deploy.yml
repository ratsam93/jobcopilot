name: Deploy JobCopilot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jobcopilot-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run backend tests
        run: python -m pytest tests -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Validate SSH secret shape
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY}" ]; then
            echo "SSH_KEY secret is empty."
            exit 1
          fi
          if ! printf '%s\n' "${SSH_KEY}" | grep -q "BEGIN .*PRIVATE KEY"; then
            echo "SSH_KEY must contain the full private key, including BEGIN/END lines."
            echo "Do not paste the public .pub key, hostname, password, or a one-line placeholder."
            exit 1
          fi
          if printf '%s\n' "${SSH_KEY}" | grep -q '\\n'; then
            echo "SSH_KEY contains literal \\n characters. Paste the key as multiline text in GitHub Secrets."
            exit 1
          fi
          if [ "$(printf '%s\n' "${SSH_KEY}" | wc -l)" -lt 3 ]; then
            echo "SSH_KEY must be multiline private-key text, not a single-line value."
            exit 1
          fi

      - name: Pull latest code and restart stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          BRANCH: main
          DEPLOY_DIR: /opt/projects/jobcopilot
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          envs: REPO_URL,BRANCH,DEPLOY_DIR
          script: |
            set -euo pipefail

            mkdir -p "$(dirname "$DEPLOY_DIR")"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              rm -rf "$DEPLOY_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git config --global --add safe.directory "$DEPLOY_DIR" || true
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            docker compose down --remove-orphans
            docker compose up -d --build --remove-orphans

            docker compose ps
            docker compose logs --tail 80 backend
            docker compose logs --tail 80 worker
            docker compose logs --tail 80 postgres

            curl -fsS http://127.0.0.1:8000/health
            curl -fsS http://127.0.0.1:8000/health/database
            curl -fsS http://127.0.0.1:3000 >/dev/null
