services:
  postgres:
    image: postgres:16-alpine
    container_name: jobcopilot-postgres
    environment:
      POSTGRES_DB: jobcopilot
      POSTGRES_USER: jobcopilot
      POSTGRES_PASSWORD: jobcopilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcopilot -d jobcopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jobcopilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    container_name: jobcopilot-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
      JOBCOPILOT_ADMIN_EMAIL: ${JOBCOPILOT_ADMIN_EMAIL:?set JOBCOPILOT_ADMIN_EMAIL in .env}
      JOBCOPILOT_ADMIN_PASSWORD: ${JOBCOPILOT_ADMIN_PASSWORD:?set JOBCOPILOT_ADMIN_PASSWORD in .env}
      JOBCOPILOT_SECRET_KEY: ${JOBCOPILOT_SECRET_KEY:?set JOBCOPILOT_SECRET_KEY in .env}
      JOBCOPILOT_JOBBER_BASE_URL: ${JOBCOPILOT_JOBBER_BASE_URL:-https://jobber.mihir.ch}
      JOBCOPILOT_JOBBER_SOURCES: ${JOBCOPILOT_JOBBER_SOURCES:-ashby:linear,lever:netlify,greenhouse:airbnb}
      JOBCOPILOT_BROWSER_AUTOMATION_ENABLED: ${JOBCOPILOT_BROWSER_AUTOMATION_ENABLED:-false}
      JOBCOPILOT_CRAWLEE_ENABLED: ${JOBCOPILOT_CRAWLEE_ENABLED:-false}
      JOBCOPILOT_CV_MATCHER_ENABLED: ${JOBCOPILOT_CV_MATCHER_ENABLED:-false}
      JOBCOPILOT_REACTIVE_RESUME_ENABLED: ${JOBCOPILOT_REACTIVE_RESUME_ENABLED:-false}
      JOBCOPILOT_LANGGRAPH_ENABLED: ${JOBCOPILOT_LANGGRAPH_ENABLED:-false}
      JOBCOPILOT_PYDANTIC_AI_ENABLED: ${JOBCOPILOT_PYDANTIC_AI_ENABLED:-false}
      JOBCOPILOT_OPENRESUME_ENABLED: ${JOBCOPILOT_OPENRESUME_ENABLED:-false}
      JOBCOPILOT_OPENRESUME_URL: ${JOBCOPILOT_OPENRESUME_URL:-http://open-resume:3000}
      JOBCOPILOT_LANGFUSE_HOST: ${JOBCOPILOT_LANGFUSE_HOST:-}
      JOBCOPILOT_LANGFUSE_PUBLIC_KEY: ${JOBCOPILOT_LANGFUSE_PUBLIC_KEY:-}
      JOBCOPILOT_LANGFUSE_SECRET_KEY: ${JOBCOPILOT_LANGFUSE_SECRET_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    container_name: jobcopilot-worker
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["celery", "-A", "apps.backend.app.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JOBCOPILOT_ADMIN_EMAIL: ${JOBCOPILOT_ADMIN_EMAIL:?set JOBCOPILOT_ADMIN_EMAIL in .env}
      JOBCOPILOT_ADMIN_PASSWORD: ${JOBCOPILOT_ADMIN_PASSWORD:?set JOBCOPILOT_ADMIN_PASSWORD in .env}
      JOBCOPILOT_SECRET_KEY: ${JOBCOPILOT_SECRET_KEY:?set JOBCOPILOT_SECRET_KEY in .env}
      JOBCOPILOT_JOBBER_BASE_URL: ${JOBCOPILOT_JOBBER_BASE_URL:-https://jobber.mihir.ch}
      JOBCOPILOT_JOBBER_SOURCES: ${JOBCOPILOT_JOBBER_SOURCES:-ashby:linear,lever:netlify,greenhouse:airbnb}
      JOBCOPILOT_BROWSER_AUTOMATION_ENABLED: ${JOBCOPILOT_BROWSER_AUTOMATION_ENABLED:-false}
      JOBCOPILOT_CRAWLEE_ENABLED: ${JOBCOPILOT_CRAWLEE_ENABLED:-false}
      JOBCOPILOT_CV_MATCHER_ENABLED: ${JOBCOPILOT_CV_MATCHER_ENABLED:-false}
      JOBCOPILOT_REACTIVE_RESUME_ENABLED: ${JOBCOPILOT_REACTIVE_RESUME_ENABLED:-false}
      JOBCOPILOT_LANGGRAPH_ENABLED: ${JOBCOPILOT_LANGGRAPH_ENABLED:-false}
      JOBCOPILOT_PYDANTIC_AI_ENABLED: ${JOBCOPILOT_PYDANTIC_AI_ENABLED:-false}
      JOBCOPILOT_OPENRESUME_ENABLED: ${JOBCOPILOT_OPENRESUME_ENABLED:-false}
      JOBCOPILOT_OPENRESUME_URL: ${JOBCOPILOT_OPENRESUME_URL:-http://open-resume:3000}
      JOBCOPILOT_LANGFUSE_HOST: ${JOBCOPILOT_LANGFUSE_HOST:-}
      JOBCOPILOT_LANGFUSE_PUBLIC_KEY: ${JOBCOPILOT_LANGFUSE_PUBLIC_KEY:-}
      JOBCOPILOT_LANGFUSE_SECRET_KEY: ${JOBCOPILOT_LANGFUSE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    container_name: jobcopilot-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  open-resume:
    profiles:
      - oss-openresume
    container_name: jobcopilot-open-resume
    build:
      context: ./oss-services/open-resume
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    restart: unless-stopped

  cv-matcher:
    profiles:
      - oss-cv-matcher
    container_name: jobcopilot-cv-matcher
    build:
      context: ./oss-services/cv-matcher
      dockerfile: build.dockerfile
    ports:
      - "3002:8501"
    restart: unless-stopped

  reactive-resume-postgres:
    profiles:
      - oss-reactive-resume
    image: postgres:16-alpine
    container_name: jobcopilot-reactive-resume-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - reactive_resume_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  reactive-resume-redis:
    profiles:
      - oss-reactive-resume
    image: redis:7-alpine
    container_name: jobcopilot-reactive-resume-redis
    command: redis-server --appendonly yes
    volumes:
      - reactive_resume_redis_data:/data
    restart: unless-stopped

  reactive-resume-storage:
    profiles:
      - oss-reactive-resume
    image: chrislusf/seaweedfs:latest
    container_name: jobcopilot-reactive-resume-storage
    command: server -s3 -filer -dir=/data -ip=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
    volumes:
      - reactive_resume_storage_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  reactive-resume-create-bucket:
    profiles:
      - oss-reactive-resume
    image: quay.io/minio/mc:latest
    container_name: jobcopilot-reactive-resume-create-bucket
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set seaweedfs http://reactive-resume-storage:8333 seaweedfs seaweedfs;
        mc mb --ignore-existing seaweedfs/reactive-resume;
        exit 0;
      "
    depends_on:
      reactive-resume-storage:
        condition: service_healthy
    restart: "no"

  reactive-resume:
    profiles:
      - oss-reactive-resume
    image: ghcr.io/amruthpillai/reactive-resume:latest
    container_name: jobcopilot-reactive-resume
    environment:
      PORT: 3000
      APP_URL: http://158.220.113.185:3003
      DATABASE_URL: postgresql://postgres:postgres@reactive-resume-postgres:5432/postgres
      AUTH_SECRET: ${REACTIVE_RESUME_AUTH_SECRET:-change-me-before-public-use}
      REDIS_URL: redis://reactive-resume-redis:6379
      ENCRYPTION_SECRET: ${REACTIVE_RESUME_ENCRYPTION_SECRET:-change-me-before-public-use}
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      S3_REGION: us-east-1
      S3_ENDPOINT: http://reactive-resume-storage:8333
      S3_BUCKET: reactive-resume
      S3_FORCE_PATH_STYLE: "true"
      FLAG_DISABLE_IMAGE_PROCESSING: "true"
    ports:
      - "3003:3000"
    depends_on:
      reactive-resume-postgres:
        condition: service_healthy
      reactive-resume-redis:
        condition: service_started
      reactive-resume-storage:
        condition: service_healthy
      reactive-resume-create-bucket:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  reactive_resume_postgres_data:
  reactive_resume_redis_data:
  reactive_resume_storage_data:
