services:
  backend:
    container_name: jobcopilot-backend
    image: python:3.12-slim
    working_dir: /app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command: sh -c "pip install --no-cache-dir fastapi uvicorn pydantic && pip install --no-cache-dir -e . && uvicorn apps.backend.app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    container_name: jobcopilot-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
