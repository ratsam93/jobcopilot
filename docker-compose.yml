services:
  postgres:
    image: postgres:16-alpine
    container_name: jobcopilot-postgres
    environment:
      POSTGRES_DB: jobcopilot
      POSTGRES_USER: jobcopilot
      POSTGRES_PASSWORD: jobcopilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jobcopilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    container_name: jobcopilot-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      APP_ENV: production
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    container_name: jobcopilot-worker
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["python", "-m", "apps.backend.app.worker"]
    environment:
      APP_ENV: production
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    container_name: jobcopilot-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
