services:
  postgres:
    image: postgres:16-alpine
    container_name: jobcopilot-postgres
    environment:
      POSTGRES_DB: jobcopilot
      POSTGRES_USER: jobcopilot
      POSTGRES_PASSWORD: jobcopilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcopilot -d jobcopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jobcopilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    container_name: jobcopilot-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    container_name: jobcopilot-worker
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["celery", "-A", "apps.backend.app.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_DATABASE_URL: postgresql+psycopg://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      JOBCOPILOT_REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    container_name: jobcopilot-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
